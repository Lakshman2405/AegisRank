methodology_summary: AegisRank is a fully offline candidate retrieval and ranking
  system designed for large-scale talent evaluation. Raw candidate profiles are processed
  through a deterministic LangGraph-based ingestion pipeline that performs schema
  validation, anomaly detection, timeline verification, candidate enrichment, and
  telemetry extraction. Candidate profiles are transformed into compact semantic narratives
  containing professional summaries, career history, and skill evidence while structured
  telemetry captures recruiter engagement signals, availability indicators, assessment
  performance, verification status, GitHub activity, and profile quality metrics.
  The enriched dataset is embedded using the BAAI/bge-small-en-v1.5 model and indexed
  inside a local Qdrant vector database containing 96,796 candidate profiles. During
  ranking, the target job description is embedded and used to retrieve the top 5,000
  semantically relevant candidates. Retrieved candidates are evaluated using a multi-factor
  ranking engine combining semantic similarity, experience, recruiter engagement,
  availability, interview behavior, offer acceptance trends, assessment performance,
  GitHub activity, profile completeness, skill overlap, and retrieval evidence. Additional
  behavioral modifiers account for notice periods and profile composition patterns.
  The final Top-100 candidates are generated through a deterministic weighted scoring
  framework together with explainable recommendation reasoning. The complete workflow
  executes locally without internet access and is optimized for containerized offline
  evaluation environments.
deployment_notes:
  streamlit_demo: Provided for demonstration purposes only.
  evaluation_mode: Primary evaluation is intended through repository execution using
    the included clean candidate dataset and prebuilt local Qdrant vector index.
  offline_support: No internet connectivity is required during evaluation. All retrieval
    and ranking operations execute locally.
  prebuilt_assets:
  - clean_candidates.jsonl
  - local_qdrant_storage
declaration: This submission executes entirely offline using a prebuilt local vector
  index and produces deterministic ranking outputs without requiring external APIs
  or internet connectivity during evaluation. The hosted Streamlit application is
  provided as a demonstration environment, while the primary evaluation workflow is
  intended to be executed locally or within a containerized Docker environment using
  the repository assets and prebuilt index included in the submission.
